# RPGGatedSemantic: same as RPG plus semantic gating (e_cf + e_sem gate).
# Inherit all RPG settings; override or add only what's needed.

metadata: sentence
sent_emb_model: text-embedding-3-large
sent_emb_dim: 3072
sent_emb_pca: 1280
text_embedding_dim: 1280
openai_api_key: ~
sent_emb_batch_size: 512

max_item_seq_len: 50
n_embd: 448
n_layer: 2
n_head: 4
n_inner: 1024
activation_function: gelu_new
resid_pdrop: 0.0
embd_pdrop: 0.5
attn_pdrop: 0.5
layer_norm_epsilon: 1e-12
initializer_range: 0.02

use_rqvae_codebook: true
rqvae_codebook_path: "cache/AmazonReviews2014/{category}/codebook/codebook-text.json"
rqvae_model_path: "ckpt/{category}/rqvae/rqvae-{category}-text.pth"
n_codebook: 32
codebook_size: 256
opq_use_gpu: False
opq_gpu_id: 0
faiss_omp_num_threads: 32

temperature: 0.07
num_beams: 50
n_edges: 50
propagation_steps: 3
chunk_size: 1024
num_workers: 64

# Gated semantic: h^text from JSON (item_id:[emb1,emb2,emb3]), use emb1. Override via config if using other categories.
semantic_emb_path: "/root/test/preprocess/emb_beauty.json"
semantic_emb_index: 0
