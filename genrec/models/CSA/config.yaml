# Overwritting configs
metadata: sentence


# Config for the backbone model
max_item_seq_len: 50
n_embd: 448
n_layer: 2
n_head: 4
n_inner: 1024
activation_function: gelu_new
resid_pdrop: 0.0
embd_pdrop: 0.5
attn_pdrop: 0.5
layer_norm_epsilon: 1e-12
initializer_range: 0.02

#loss weights
alpha: 1
contrastive_alpha: 0.1
contrastive_tau: 0.1
manifold_beta: 0.5 #0.05
manifold_c: 0.5 #1.0

# Semantic ID configs
# 修改原因：使用RQVae码本替代FAISS码本
# 原代码：FAISS码本配置
# n_codebook: 32
# codebook_size: 256
# opq_use_gpu: False
# opq_gpu_id: 0
# faiss_omp_num_threads: 32

# 新代码：RQVae码本配置
use_rqvae_codebook: true
# 修改原因：改为动态路径，根据category参数自动选择对应的码本文件
# 原代码：硬编码Sports_and_Outdoors路径
# 新代码：使用占位符，运行时动态替换
rqvae_codebook_path: "cache/AmazonReviews2014/{category}/codebook/codebook-text.json"
rqvae_model_path: "ckpt/{category}/rqvae/rqvae-{category}-text.pth"

# 修改原因：tokenizer仍然需要这些参数，即使使用RQVae码本
# 原代码：完全注释掉FAISS参数
# 新代码：保留必要参数，避免KeyError
n_codebook: 32
codebook_size: 256
opq_use_gpu: False
opq_gpu_id: 0
faiss_omp_num_threads: 32




#——————————————deprecated configs——————————————————
# sent_emb_pca: 1280
# # 修改原因：明确指定融合时使用的PCA维度
# text_embedding_dim: 1280

# Config the sentence embedding model
#   Sentence T5
# sent_emb_model: sentence-transformers/sentence-t5-base
# sent_emb_dim: 768
# sent_emb_pca: 128
#   OpenAI Embedding Model
sent_emb_model: text-embedding-3-large
sent_emb_dim: 3072
# 修改原因：使用原始特征训练码本，但融合时使用PCA特征
# 原代码：使用PCA降维后的特征训练码本
# sent_emb_pca: 512

# 新代码：使用原始特征训练码本，但融合时使用PCA特征
# 原代码：sent_emb_pca: 0 (使用原始特征)
# 新代码：融合时使用1280维PCA特征，这是之前测试效果最好的维度
openai_api_key: ~

sent_emb_batch_size: 512

# RPG configs
#   model
temperature: 0.07
num_beams: 50
n_edges: 50
propagation_steps: 3
#   decoding graph construction
chunk_size: 1024
num_workers: 64