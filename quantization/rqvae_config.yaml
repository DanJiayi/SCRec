
# By default, the Beauty dataset is used. To switch to other datasets:

# 1. Change `dataset.name` to the target dataset.
# 2. Update `RQ-VAE.num_layers`:
#    - 32 for Beauty
#    - 16 for Sports_and_Outdoors and Toys_and_Games

dataset:
  name: "Beauty" 
  max_items_per_seq: 128
  type: "AmazonReviews2014"
  features_needed: ["title", "brand", "categories"]
  prompt_format: "v1"

data_processing:
  cache_dir: "cache"
  metadata: "sentence" 
  sent_emb_model: "text-embedding-3-large"
  sent_emb_dim: 3072
  sent_emb_batch_size: 100
  sent_emb_pca: 512 
  n_codebook: 8
  codebook_size: 256
  faiss_omp_num_threads: 16
  opq_use_gpu: false
  opq_gpu_id: 0
  openai_api_key: ~
  openai_base_url: ~

RQ-VAE:
  input_dim: 512 
  hidden_dim: [1024, 512]
  latent_dim: 256
  num_layers: 32
  code_book_size: 256
  dropout: 0.0
  beta: 0.25
  epochs: 5000
  batch_size: 4096
  optimizer: "AdamW"
  lr: 0.001
  weight_decay: 0.0
  
training:
  device: "cuda:0"

accelerator: "cuda:0"